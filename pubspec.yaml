name: moodfit
description: A fitness app based on your mood and energy levels
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  fl_chart: ^0.71.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  async: ^2.12.0
  firebase_core: ^2.21.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/icons/
    - assets/images/
